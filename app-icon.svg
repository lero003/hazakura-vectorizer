<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hazakura Vectorizer app icon (1024x1024)
  Brand: cherry blossom (sakura) + a "V" stroke symbolising vector traces.
  Two-tone: sage leaf as base, sakura petals and a flowing V path on top.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#244e3b"/>
      <stop offset="100%" stop-color="#1a3a2c"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3b8cb"/>
      <stop offset="55%" stop-color="#d97a9c"/>
      <stop offset="100%" stop-color="#b85f80"/>
    </linearGradient>
    <linearGradient id="vein" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbe6ee"/>
      <stop offset="100%" stop-color="#d97a9c"/>
    </linearGradient>
    <radialGradient id="center" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbe6ee"/>
      <stop offset="65%" stop-color="#e8b6c8"/>
      <stop offset="100%" stop-color="#b85f80"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- 5 sakura petals, rotated around center (512,512) -->
  <g transform="translate(512 512)">
    <!-- Petal template: 5 hearts arranged at top; rotated by 72deg -->
    <g>
      <!-- top -->
      <g transform="rotate(0)">
        <path d="M 0 -300
                 C 90 -300 160 -220 160 -130
                 C 160 -50 80 30 0 80
                 C -80 30 -160 -50 -160 -130
                 C -160 -220 -90 -300 0 -300 Z"
              fill="url(#petal)"/>
        <!-- petal highlight -->
        <path d="M -50 -240 C -10 -260 60 -240 60 -180"
              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="14" stroke-linecap="round"/>
        <!-- petal notch (heart) -->
        <circle cx="0" cy="-220" r="20" fill="url(#bg)"/>
      </g>
      <g transform="rotate(72)">
        <path d="M 0 -300
                 C 90 -300 160 -220 160 -130
                 C 160 -50 80 30 0 80
                 C -80 30 -160 -50 -160 -130
                 C -160 -220 -90 -300 0 -300 Z"
              fill="url(#petal)"/>
        <path d="M -50 -240 C -10 -260 60 -240 60 -180"
              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="0" cy="-220" r="20" fill="url(#bg)"/>
      </g>
      <g transform="rotate(144)">
        <path d="M 0 -300
                 C 90 -300 160 -220 160 -130
                 C 160 -50 80 30 0 80
                 C -80 30 -160 -50 -160 -130
                 C -160 -220 -90 -300 0 -300 Z"
              fill="url(#petal)"/>
        <path d="M -50 -240 C -10 -260 60 -240 60 -180"
              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="0" cy="-220" r="20" fill="url(#bg)"/>
      </g>
      <g transform="rotate(216)">
        <path d="M 0 -300
                 C 90 -300 160 -220 160 -130
                 C 160 -50 80 30 0 80
                 C -80 30 -160 -50 -160 -130
                 C -160 -220 -90 -300 0 -300 Z"
              fill="url(#petal)"/>
        <path d="M -50 -240 C -10 -260 60 -240 60 -180"
              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="0" cy="-220" r="20" fill="url(#bg)"/>
      </g>
      <g transform="rotate(288)">
        <path d="M 0 -300
                 C 90 -300 160 -220 160 -130
                 C 160 -50 80 30 0 80
                 C -80 30 -160 -50 -160 -130
                 C -160 -220 -90 -300 0 -300 Z"
              fill="url(#petal)"/>
        <path d="M -50 -240 C -10 -260 60 -240 60 -180"
              fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="14" stroke-linecap="round"/>
        <circle cx="0" cy="-220" r="20" fill="url(#bg)"/>
      </g>
    </g>

    <!-- Center disc (stamen) -->
    <circle r="74" fill="url(#center)"/>
    <circle r="74" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <!-- stamen dots -->
    <g fill="#fbe6ee">
      <circle cx="0" cy="-32" r="6"/>
      <circle cx="30" cy="-10" r="6"/>
      <circle cx="20" cy="22" r="6"/>
      <circle cx="-20" cy="22" r="6"/>
      <circle cx="-30" cy="-10" r="6"/>
      <circle cx="0" cy="0" r="9" fill="#fbe6ee"/>
    </g>
  </g>

  <!-- Vector "V" stroke overlay across the petals: suggests tracing/vectorization -->
  <path d="M 280 760 L 512 920 L 744 760"
        fill="none" stroke="#fbe6ee" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.9"/>
  <path d="M 280 760 L 512 920 L 744 760"
        fill="none" stroke="#d97a9c" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.6"
        transform="translate(0 0)"/>
</svg>
