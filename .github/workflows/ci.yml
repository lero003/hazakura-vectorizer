name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + vite build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
  rust:
    name: Rust (cargo check)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Verify vtracer binary is committed
        run: |
          test -x src-tauri/binaries/vtracer-aarch64-apple-darwin \
            || (echo "vtracer binary missing — see HAZKURA_HANDOFF.md" && exit 1)
      - run: cargo check --manifest-path src-tauri/Cargo.toml --locked
